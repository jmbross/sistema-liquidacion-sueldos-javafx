name: Release package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Verify
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

  package:
    name: Build portable package
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Verify and package
        shell: pwsh
        run: ./scripts/package-release.ps1 -SkipVerification
      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: payroll-modernization-release
          path: target/release-assets/*
          if-no-files-found: error
